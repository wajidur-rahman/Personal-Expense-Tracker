<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h2>Expense Tracker</h2>

        <div class="balance-container">
            <h4>Your Balance</h4>
            <h1 id="balance">৳0.00</h1>
        </div>

        <div class="inc-exp-container">
            <div>
                <h4>Income</h4>
                <p id="money-plus" class="money plus">+৳0.00</p>
            </div>
            <div class="divider"></div>
            <div>
                <h4>Expense</h4>
                <p id="money-minus" class="money minus">-৳0.00</p>
            </div>
        </div>

        <h3>Add New Transaction</h3>
        <form id="form">
            <div class="form-control">
                <label for="text">Description</label>
                <input type="text" id="text" placeholder="e.g., Salary, Rent, Grocery..." required />
            </div>

            <div class="form-control">
                <label for="type">Transaction Type</label>
                <select id="type">
                    <option value="income">Income (+)</option>
                    <option value="expense">Expense (-)</option>
                </select>
            </div>

            <div class="form-control">
                <label for="amount">Amount (৳)</label>
                <input type="number" id="amount" placeholder="Enter amount..." min="1" required />
            </div>
            <button class="btn">Add Transaction</button>
        </form>

        <button id="toggle-history-btn" class="toggle-history-btn">View History (0)</button>

        <div id="history-section" class="history-section hide">
            <div class="history-header">
                <h3>History</h3>
                <button id="clear-btn" class="clear-btn">Clear All</button>
            </div>
            <ul id="list" class="list"></ul>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
